---
# SPDX-License-Identifier: Apache-2.0
# SPDX-FileCopyrightText: 2024 The Linux Foundation

name: '🔑 JSON Variable Key/Value Lookup'
description: 'Lookup a value in a JSON key/value lookup table'

inputs:
  json:
    description: 'The JSON key/value lookup table'
    required: true
  key:
    description: 'The JSON key requiring lookup'
    required: true
  default:
    description: 'Default value to return if lookup fails'
    required: false
  summary_output:
    description: 'Displays summary output'
    required: false
    default: 'false'
  exit_on_failure:
    description: 'Exit with error on failure'
    required: false
    default: 'true'
  silent:
    # Present for security, in case the content that might be sensitive
    description: 'Suppress output of returned values'
    required: false
    default: 'false'

outputs:
  value:
    description: 'The value associated with the supplied key'
    value: ${{ steps.lookup.outputs.value }}

runs:
  using: 'composite'
  steps:
    - name: 'JSON Variable Key/Value Lookup'
      id: lookup
      shell: bash
      env:
        INPUT_JSON: ${{ inputs.json }}
        INPUT_KEY: ${{ inputs.key }}
        INPUT_DEFAULT: ${{ inputs.default }}
        INPUT_SUMMARY_OUTPUT: ${{ inputs.summary_output }}
        INPUT_EXIT_ON_FAILURE: ${{ inputs.exit_on_failure }}
        INPUT_SILENT: ${{ inputs.silent }}
      run: |
        # JSON Variable Key/Value Lookup

        # Note: Don't set json as a variable, since that breaks later parsing
        key="$INPUT_KEY"
        default="$INPUT_DEFAULT"
        summary_output=$(echo "$INPUT_SUMMARY_OUTPUT" | \
          tr '[:upper:]' '[:lower:]')
        exit_on_failure=$(echo "$INPUT_EXIT_ON_FAILURE" | \
          tr '[:upper:]' '[:lower:]')
        silent=$(echo "$INPUT_SILENT" | tr '[:upper:]' '[:lower:]')

        # Validate that input variables are populated
        if [ -z "$INPUT_JSON" ]; then
          echo 'Error: variable/JSON string was NOT passed as input ❌'
          exit 1
        elif [ -z "$key" ]; then
          echo 'Error: required lookup key was NOT passed as input ❌'
          exit 1
        fi

        # Ensure JSON parser/binary is available
        jq_cmd=$(which jq || true)
        if [ ! -x "$jq_cmd" ]; then
          echo 'Error: jq command was NOT found in the PATH ❌'; exit 1
        fi

        # Check that string parses as valid JSON
        if (jq -re '""' <<< "$INPUT_JSON" 2>&1); then
          echo 'JSON parsing successful ✅'
        else
          echo 'Error: jq command was NOT able to parse JSON ❌'; exit 1
        fi

        echo "Key to lookup: $key 🔑"

        value=$(echo "$INPUT_JSON" | \
          "$jq_cmd" -r --arg KEY "$key" '.[] | select(.key==$KEY) | .value')

        if [ -z "$value" ] && [ -z "$default" ]; then
          echo 'Key/value lookup failed ❌'
          failed='true'
        elif [ -z "$value" ]; then
          echo 'Key/value lookup failed ⚠️'
          value="$default"
        fi

        echo "value=$value" >> "$GITHUB_ENV"
        echo "value=$value" >> "$GITHUB_OUTPUT"

        if [ "$silent" != "true" ]; then
          echo "Value returned: $value 💬" >> "$GITHUB_STEP_SUMMARY"
        fi

        if [ "$summary_output" = "true" ]; then
          echo '### 🔑 JSON Variable Key/Value Lookup' >> "$GITHUB_STEP_SUMMARY"
          echo "Key to lookup: $key 🔑" >> "$GITHUB_STEP_SUMMARY"
          if [ "$silent" != "true" ]; then
            echo "Value returned: $value 💬" >> "$GITHUB_STEP_SUMMARY"
          fi
        fi

        # After displaying summary, exit with error
        if [ "$failed" = 'true' ] && \
          [ "$exit_on_failure" = 'true' ]; then
          exit 1
        fi
